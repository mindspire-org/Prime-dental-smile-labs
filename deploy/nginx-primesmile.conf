# Prime Smile Labs — nginx reverse proxy.
#
# The Node process (server.mjs) already serves EVERYTHING on port 8080:
# the SPA, /api, /uploads and the /ws WebSocket. So nginx only needs a
# single proxy_pass with WebSocket upgrade support — no per-path blocks.
#
# Install:
#   cp deploy/nginx-primesmile.conf /etc/nginx/sites-available/primesmile
#   ln -s /etc/nginx/sites-available/primesmile /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# Then add TLS with:  certbot --nginx -d primesmile.example.com

upstream primesmile_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name primesmile.example.com;   # <-- change to your domain

    # Allow large file uploads (media route uses multer). Tune as needed.
    client_max_body_size 25m;

    # Long timeouts so WebSocket connections aren't culled mid-session.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass http://primesmile_app;
        proxy_http_version 1.1;

        # WebSocket upgrade (covers /ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Preserve client info for the Express app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }
}

# Map for the Connection header: "upgrade" for WS, "" (close) otherwise.
# Place this in /etc/nginx/conf.d/ or the http{} block ONCE. If you already
# have a $connection_upgrade map elsewhere, delete this block to avoid a
# duplicate-map error.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
